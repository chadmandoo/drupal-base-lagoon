name: Lagoon Deploy
on:
  push:
    branches: [main, "release/*"]
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  deploy:
    runs-on: [self-hosted, lagoon-local]
    steps:
      - uses: actions/checkout@v4
      - name: Resolve env name
        id: env
        run: |
          name="${{ github.head_ref || github.ref_name }}"
          name="${name//\//-}"
          name="$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')"
          echo "name=$name" >> "$GITHUB_OUTPUT"
      - name: Bootstrap lagoon CLI context
        env:
          KEY: ${{ secrets.LAGOON_SSH_PRIVATE_KEY }}
          GRAPHQL: ${{ secrets.LAGOON_GRAPHQL }}
          SSH_HOST: ${{ secrets.LAGOON_SSH_HOST }}
          SSH_PORT: ${{ secrets.LAGOON_SSH_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/lagoon_ci && chmod 600 ~/.ssh/lagoon_ci
          cat > ~/.lagoon-ci.yml <<YAML
          current: ci
          default: ci
          lagoons:
            ci:
              graphql: ${GRAPHQL}
              hostname: ${SSH_HOST}
              port: "${SSH_PORT}"
              sshkey: ${HOME}/.ssh/lagoon_ci
          YAML
          lagoon --config-file ~/.lagoon-ci.yml -l ci whoami
      - name: Trigger Lagoon branch deploy
        run: |
          lagoon --config-file ~/.lagoon-ci.yml -l ci deploy branch \
            -p drupal-base \
            -b "${{ steps.env.outputs.name }}" \
            --force
          echo "Deploy triggered for env: ${{ steps.env.outputs.name }}"
          echo "Check progress via: lagoon -l local logs deployment -p drupal-base -e ${{ steps.env.outputs.name }} -f"
